<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      td,
      th {
        border: 1px solid rgb(118, 114, 114);
       
      }
      table {
        width: 100%;
        border: 1px solid grey;
        border-collapse: collapse;
        align-items: center;
      }
      .center {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <table>
      <caption>
        Student Details Table
      </caption>
      <thead>
        <tr style="background-color: aqua">
          <th>Name</th>
          <th>Sbject</th>
          <th>Marks</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td rowspan="2" class="center">Pooja</td>
          <td class="center">Math</td>
          <td class="center">90</td>
        </tr>

        <tr>
          <td class="center">Science</td>
          <td class="center">85</td>
        </tr>

        <tr>
          <td colspan="2" class="center">Total</td>
          <td class="center">175</td>
        </tr>

        <tr style="background-color: gray">
          <td colspan="3" class="center">Result:Pass</td>
        </tr>
      </tbody>

      <tfoot></tfoot>
    </table>
  </body>
</html>
