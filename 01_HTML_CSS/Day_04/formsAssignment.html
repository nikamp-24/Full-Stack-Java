<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <label for="fullName">Full Name:</label>
      <input type="text" id="fullName" /><br /><br />

      <label for="pass">Password:</label>
      <input type="password" id="pass" /><br /><br />

      <label for="email">Email:</label>
      <input type="email" id="email" /><br /><br />

      <label for="pnone">Phone No:</label>
      <input type="phone" id="phone" name="phone" maxlength="10" /><br /><br />

      <label for="DOB">DOB:</label>
      <input type="date" id="DOB" /><br /><br />

      <label for="week">Week</label>
      <input type="week" id="week" /><br /><br />

      <label for="range"></label>
      <input type="range" id="range" /><br />

      <p>Gender:</p>

      <label for="male">Male</label>
      <input type="radio" id="male" value="male" name="Gender" />

      <label for="female">Female</label>
      <input type="radio" id="female" value="female" name="Gender" />

      <label for="other">other</label>
      <input type="radio" id="other" value="other" name="Gender" />

      <p>Select your languages:</p>

      <label for="marathi">Marathi</label>
      <input type="checkbox" id="marathi" name="language1" value="Marathi" />

      <label for="hindi">Hindi</label>
      <input type="checkbox" id="hindi" name="language2" value="Hindi" />

      <label for="english">English</label>
      <input type="checkbox" id="english" name="language3" value="English" />
      <br /><br />
      <label for="course">Select your course:</label>
      <select id="course" name="Course">
        <option value="Java">Java</option>
        <option value="Python">Python</option>
        <option value="Javascript">Javascript</option></select
      ><br /><br />

      <label for="msg">Enter your message:</label>
      <textarea
        id="msg"
        name="message"
        placeholder="Enter your message here......"
      >
      </textarea
      ><br /><br />

      <label for="file">Choose file</label>
      <input type="file" id="file" name="file"><br /><br />

     
      <input type="submit" value="submit">
      <input type="reset" value="reset">
      <input type="submit" value="submit">
    </form>
  </body>
</html>
