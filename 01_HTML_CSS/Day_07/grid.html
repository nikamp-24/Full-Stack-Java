<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>

    <style>
        body{
            height: 100vh;
            width: 100vw;
        }
        .container {
            box-sizing: border-box;
            width: 100%;
            padding: 1rem;
            border: 1px solid black;
            height: 100%;
           display: grid;
        
           grid-template-rows: repeat(4,1fr);
           grid-template-columns: repeat(3, 1fr);
        }

        .box {
            background-color: blue;
            border: 1px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header, .footer{
            grid-column-start: 1;
            grid-column-end: 4;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar{
            grid-row-start: 2;
            grid-row-end: 4;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content1{
            grid-column-start: 2;
            grid-column-end: 4;
            
        }
    </style>
</head>

<body>
    <header></header>
    <bod>
        <div class="container">
            <div class="box header">header</div>
            <div class="box sidebar">Sidebar</div>
            <div class="box content1">Content 1</div>
            <div class="box content2">Content 2</div>
            <div class="box content3">Content 3</div>
            <div class="box footer">Footer</div>

        </div>
    </bod>
    <footer></footer>
</body>

</html>
